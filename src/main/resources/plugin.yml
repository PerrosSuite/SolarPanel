name: SolarPanel
version: ''

main: org.test.solarPanel.SolarPanel
api-version: ''
load: POSTWORLD

commands:
  fly:
    description:
      бҙҖбҙӣбҙӣЙӘбҙ бҙҖ ЙӘКҹ бҙ бҙҸКҹбҙҸ (кңұбҙҸКҹбҙҸ бҙҳбҙҮКҖ кңұбҙӣбҙҖкң°кң°)
    usage:
      /<command>
    aliases:
      - f
    permission: solarpanel.fly

  gmc:
    description:
      бҙҖбҙӣбҙӣЙӘбҙ бҙҖ бҙ„КҖбҙҮбҙҖбҙӣЙӘбҙ бҙҖ (кңұбҙҸКҹбҙҸ бҙҳбҙҮКҖ кңұбҙӣбҙҖкң°кң°)
    usage:
      /<command>
    permission: solarpanel.gmc

  gms:
    description:
      бҙҖбҙӣбҙӣЙӘбҙ бҙҖ кңұбҙңКҖбҙ ЙӘбҙ бҙҖКҹ (кңұбҙҸКҹбҙҸ бҙҳбҙҮКҖ кңұбҙӣбҙҖкң°кң°)
    usage:
      /<command>
    permission: solarpanel.gms
  tp:
    description:
      бҙңбҙӣЙӘКҹЙӘбҙўбҙўбҙҖ ЙӘКҹ бҙӣбҙҮКҹбҙҮбҙӣКҖбҙҖкңұбҙҳбҙҸКҖбҙӣбҙҸ (кңұбҙҸКҹбҙҸ бҙҳбҙҮКҖ кңұбҙӣбҙҖкң°кң°)
